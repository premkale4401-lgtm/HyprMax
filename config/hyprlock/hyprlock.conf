# ======================================================
# HyprMax Lock Screen
# ======================================================

background {
    path = ~/.config/hypr/wallpapers/default.jpg
    blur_passes = 3
    blur_size = 8
}

label {
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(ffffffff)
    font_size = 80
    position = 0,120
    halign = center
    valign = center
}

label {
    text = cmd[update:60000] echo "$(date +"%A, %d %B %Y")"
    color = rgba(cdd6f4ff)
    font_size = 22
    position = 0,55
    halign = center
    valign = center
}

input-field {
    size = 320,55

    outline_thickness = 2

    dots_size = 0.22
    dots_spacing = 0.35

    outer_color = rgba(89b4faff)
    inner_color = rgba(1e1e2eff)
    font_color = rgba(cdd6f4ff)

    fade_on_empty = false

    rounding = 14

    position = 0,-80

    halign = center
    valign = center
}
