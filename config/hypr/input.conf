# ======================================================
# HyprMax Input Configuration
# ======================================================

input {
    kb_layout = us

    follow_mouse = 1

    touchpad {
        natural_scroll = true
        tap-to-click = true
        disable_while_typing = true
        scroll_factor = 1.0
    }

    sensitivity = 0
}

gestures {
    workspace_swipe = true
    workspace_swipe_fingers = 3
}
